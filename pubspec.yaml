  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  collection: ^1.18.0
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.19.0
  decimal: ^3.0.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.0
  csv: ^5.0.2
  file_picker: ^8.1.2
  supabase_flutter: ^2.5.6
  crypto: ^3.0.5
  uuid: ^4.5.1
  flutter_svg: ^2.0.10+1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  in_app_review: ^2.0.9
  http: ^1.2.2
  share_plus: ^12.0.1
  permission_handler: ^11.3.1
  dio: ^5.4.3+1
  open_filex: ^4.4.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_list_view: ^1.1.29
  visibility_detector: ^0.4.0+2
  reorderable_grid_view: ^2.2.8
  excel: ^4.0.6
  home_widget: ^0.7.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  image_cropper: ^10.0.0
  gbk_codec: ^0.4.0
  app_links: ^6.4.1
  record: ^5.1.2
  yaml: ^3.1.2
  qr_flutter: ^4.1.0
  gal: ^2.3.0
  archive: ^3.6.1
  in_app_purchase: ^3.1.0
  in_app_purchase_storekit: ^0.3.6
  flutter_ai_kit:
    path: packages/flutter_ai_kit
  flutter_ai_kit_zhipu:
    path: packages/flutter_ai_kit_zhipu
  flutter_ai_kit_openai:
    path: packages/flutter_ai_kit_openai
  flutter_cloud_sync:
    path: packages/flutter_cloud_sync
  flutter_cloud_sync_supabase:
    path: packages/flutter_cloud_sync_supabase
  flutter_cloud_sync_webdav:
    path: packages/flutter_cloud_sync_webdav
  flutter_cloud_sync_icloud:
    path: packages/flutter_cloud_sync_icloud
  flutter_cloud_sync_s3:
    path: packages/flutter_cloud_sync_s3
  quick_actions: ^1.1.0
  table_calendar: ^3.1.0
  local_auth: ^2.3.0
  webview_flutter: ^4.13.0
  webview_flutter_wkwebview: ^3.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.10
  drift_dev: ^2.20.2
  flutter_launcher_icons: ^0.14.4
  # Testing framework enhancements
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

dependency_overrides:
  # Fix record_linux compatibility issue (we target iOS/Android only)
  record_platform_interface: 1.2.0
  # Pin to 7.1.0 because 7.2.0 requires Flutter >= 3.27.6 (Color.toARGB32)
  image_cropper_platform_interface: 7.1.0

# adaptive_* 三个素材由 scripts/gen_adaptive_icons.py 生成(几何取自 assets/logo.svg);
# monochrome 是 Android 13+ themed icon(Pixel 动态图标)的单色镂空层,见 issue #186。
flutter_launcher_icons:
  android: true
  ios: false  # iOS 图标手工维护,0.14.x 会重写 Contents.json 格式,不要让它碰
  # ⚠️ legacy mipmap ic_launcher.png 已钉死为线上版本(担心影响存量用户),
  # 重跑本工具后务必恢复:git checkout main -- android/app/src/main/res/mipmap-*/ic_launcher.png
  image_path: assets/icon/launcher_legacy.png  # 不透明白底!透明 legacy 图标在部分设备表现差
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/adaptive_foreground.png
  adaptive_icon_monochrome: assets/icon/adaptive_monochrome.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo.svg
    - assets/bee.svg
    - assets/logo2.png
    - assets/icons/
    - assets/images/
    - assets/header_skins/
  # 字体已移动到可选依赖，使用系统字体以减少应用体积
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
