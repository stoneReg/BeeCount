plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load signing credentials from key.properties (not committed to VCS)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.tntlikely.beecount"
    compileSdk = 36
    // Keep in sync with plugins' required NDK to avoid build warnings/errors.
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17

        // Required by some plugins (e.g. flutter_local_notifications) when using newer Java APIs.
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.tntlikely.beecount"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 23  // Required by record_android for voice recording
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    // 当未在命令行指定 --flavor 时，默认选择 dev 风味，避免 Flutter 调试找不到 APK。
    missingDimensionStrategy "env", "dev"
    }

    flavorDimensions += ["env"]
    productFlavors {
        dev {
            dimension "env"
            applicationIdSuffix ".dev"
            resValue "string", "app_name", "蜜蜂记账测试版"
        }
        prod {
            dimension "env"
            resValue "string", "app_name", "蜜蜂记账"
        }
    }

    // 按 ABI 拆 APK 产出多个独立分发包(2026-05-24):
    //   - arm64-v8a:99% 现代真机 + Apple Silicon 模拟器,主分发
    //   - armeabi-v7a:2014 前 32-bit only 老设备兼容
    //   - x86_64:Intel/Win/Linux 模拟器
    //   - universal:三 ABI 全打,兜底 / 不知道 ABI 的用户
    // 单包 ~30-42 MB(原 universal 52 MB,主流 arm64-only 用户实际下载 ~40 MB)。
    // x86 32-bit ABI 完全去掉(无真机用户,32 位 Intel 模拟器极少)。
    //
    // !!! AAB(App Bundle)build 不能开 splits.abi !!!
    // AAB 本身就按 ABI 自动 split(Google Play 给设备分发对应 ABI),再开
    // splits.abi 会让 R8 同一次 minify 产出 4 份 shrunk-resources,AGP 报
    // "Multiple shrunk-resources files found"。所以根据 task name 动态启用:
    // - assembleProdRelease(APK): splits 开,产 4 个 APK
    // - bundleProdRelease(AAB):splits 关,正常 AAB
    splits {
        abi {
            enable = !gradle.startParameter.taskNames.any { it.toLowerCase().contains("bundle") }
            reset()
            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            universalApk true
        }
    }

    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            } else {
                // CI/Local fallback: if no key.properties, ensure a temporary debug keystore exists
                // and sign release with it so the build doesn't fail. Artifacts will be installable
                // but NOT suitable for Play upload. Provide real key.properties for production.
                def ciKeystorePath = new File(rootDir, "ci-debug.keystore")
                if (!ciKeystorePath.exists()) {
                    // Try to generate a debug-like keystore via keytool
                    def javaHome = System.getenv('JAVA_HOME')
                    def keytool = javaHome ? new File(javaHome, 'bin/keytool').absolutePath : 'keytool'
                    try {
                        project.logger.lifecycle("[signing] Generating CI debug keystore at ${ciKeystorePath.absolutePath}")
                        def proc = new ProcessBuilder(
                                keytool,
                                '-genkey', '-noprompt',
                                '-keystore', ciKeystorePath.absolutePath,
                                '-storepass', 'android',
                                '-keypass', 'android',
                                '-alias', 'androiddebugkey',
                                '-dname', 'CN=CI, OU=CI, O=CI, L=Mountain View, S=CA, C=US',
                                '-validity', '10000',
                                '-keyalg', 'RSA', '-keysize', '2048'
                        ).redirectErrorStream(true).start()
                        proc.waitFor()
                    } catch (Throwable t) {
                        project.logger.warn('[signing] Failed to generate CI debug keystore, build may produce unsigned artifacts', t)
                    }
                }
                if (ciKeystorePath.exists()) {
                    storeFile ciKeystorePath
                    storePassword 'android'
                    keyAlias 'androiddebugkey'
                    keyPassword 'android'
                } else {
                    // As a last resort, try using the conventional user home debug.keystore if present.
                    def homeDebug = new File(System.getProperty('user.home'), '.android/debug.keystore')
                    if (homeDebug.exists()) {
                        storeFile homeDebug
                        storePassword 'android'
                        keyAlias 'androiddebugkey'
                        keyPassword 'android'
                    } else {
                        // Leave signingConfig incomplete so AGP will output an unsigned APK instead of failing early.
                        project.logger.lifecycle('[signing] No keystore available; release APK will be unsigned.')
                    }
                }
            }
        }
    }

    buildTypes {
        debug {
            // Debug 构建追加独立后缀，名称显示为测试版，便于与生产包共存
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            resValue "string", "app_name", "蜜蜂记账测试版"
        }
        release {
            // Use a stable release keystore so upgrades don't require uninstall
            signingConfig = signingConfigs.release
            // Enables code shrinking, obfuscation, and optimization for release builds.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // 支持 16KB 页面大小 (Google Play 2024+ 要求)
    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    // 当存在 flavors 时，assembleDebug 会聚合构建所有 debug 变体（devDebug、prodDebug），
    // 这会让 Flutter 工具无法确定唯一 APK 路径。这里忽略 prodDebug，仅保留 devDebug，
    // 从而让不带 --flavor 的 `flutter run` 正常工作并默认使用 dev。
    variantFilter { variant ->
        def names = variant.flavors*.name
        if (variant.buildType.name == 'debug' && names.contains('prod')) {
            setIgnore(true)
        }
    }
}

// 自定义 Release APK 命名:
//   - arm64-v8a:  app-<flavor>-release-v<ver>(<code>).apk           (主分发,保持原名)
//   - armeabi-v7a: app-<flavor>-armeabi-v7a-release-v<ver>(<code>).apk
//   - x86_64:     app-<flavor>-x86_64-release-v<ver>(<code>).apk
//   - universal:  app-<flavor>-universal-release-v<ver>(<code>).apk (三 ABI 兜底)
android.applicationVariants.all { variant ->
    if (variant.buildType.name == 'release') {
        variant.outputs.all { output ->
            def flavor = variant.flavorName ?: ""
            def vName = variant.versionName
            def vCode = variant.versionCode
            def abi = output.getFilter(com.android.build.OutputFile.ABI)
            def baseName
            if (abi == null) {
                // splits.abi.universalApk=true 产出的 universal 包(含所有 include 的 ABI)
                baseName = "app-${flavor}-universal-release-v${vName}(${vCode}).apk"
            } else if (abi == "arm64-v8a") {
                // 主分发保持原命名
                baseName = "app-${flavor}-release-v${vName}(${vCode}).apk"
            } else {
                baseName = "app-${flavor}-${abi}-release-v${vName}(${vCode}).apk"
            }
            try {
                output.outputFileName = baseName
            } catch (ignored) {
                // For newer AGP where outputFileName setter may differ, ignore silently
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Java language desugaring support for older Android devices.
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // Required by uCrop 2.2.11 (bundled with image_cropper 10.0.0) for downloading image URIs
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
